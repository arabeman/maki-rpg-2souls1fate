<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Two Souls One Fate</title>
    <link rel="icon" href="./assets/tiles_kenney/sword4.png" type="image/png">
    <style>
        @font-face {
            font-family: 'Monocraft';
            src: url('./assets/fonts/Monocraft-ttf/Monocraft.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas { display: block; }
        #mobile-blocker {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            color: #fff;
            font-family: 'Monocraft', monospace;
            text-align: center;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            z-index: 9999;
        }
        #mobile-blocker h1 {
            font-size: 1.5rem;
            color: #ff5555;
        }
        #mobile-blocker p {
            font-size: 0.9rem;
            max-width: 400px;
            line-height: 2;
            opacity: 0.7;
        }
        @media (max-width: 767px) {
            #mobile-blocker { display: flex; }
            canvas { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="mobile-blocker">
        <h1>SORRY!</h1>
        <p>This game requires a keyboard.<br>Desktop only.</p>
    </div>
    <script type="module" src="./game.js"></script>
</body>
</html>
